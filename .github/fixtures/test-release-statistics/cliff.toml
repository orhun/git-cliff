# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration

[changelog]
# A Tera template to be rendered for each release in the changelog.
# See https://keats.github.io/tera/docs/#introduction
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}
### Commit Statistics
    * {{ statistics.commit_count }} commits contributed to the release.
	{%- if statistics.commit_timespan is defined %}
	* {{ statistics.commit_timespan }} days passed between the first and last commit.
	{%- endif %}
	* {{ statistics.conventional_commit_count }} commits were understood as conventional.
	* {{ statistics.total_link_count }} issues like '(#ID)' were seen in commit messages.
	{%- if statistics.link_counts | length > 0 %}
	{%- for link in statistics.link_counts %}
		** [{{ link.text }}]({{ link.href }}) ({{ link.count }} time{% if link.count > 1 %}s{% endif %} referenced)
	{%- endfor %}
	{%- endif %}
	{%- if statistics.days_passed_since_last_release is defined %}
	* {{ statistics.days_passed_since_last_release }} days passed between releases.
	{%- endif %}\n\n
"""

[git]
# An array of regex based parsers for extracting data from the commit message.
# Assigns commits to groups.
# Optionally sets the commit's `scope` and can decide to exclude commits from further processing.
commit_parsers = [
    { message = "^feat", group = "Features", default_scope = "app" },
    { message = "^fix", group = "Bug Fixes", scope = "cli" },
]
# An array of link parsers for extracting external references, and turning them into URLs, using regex.
link_parsers = [
    { pattern = "#(\\d+)", href = "https://github.com/orhun/git-cliff/issues/$1"},
    { pattern = "RFC(\\d+)", text = "ietf-rfc$1", href = "https://datatracker.ietf.org/doc/html/rfc$1"},
]
